name: Agent control gates

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  agent-control:
    name: Branch, sync, template, and secret checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Branch policy
        run: scripts/ci-agent-branch-policy.sh

      - name: Template validation
        run: scripts/validate-agent-template.sh

      - name: Basic secret scan
        run: scripts/ci-secret-scan.sh

      - name: Git status
        run: git status --short

